<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Progress Report...</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      .error {
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1 id="title">Loading progress report...</h1>
        <p id="message">Fetching the print-ready report and rendering it now.</p>
      </div>
    </div>
    <script>
      (async function renderProgressReport() {
        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');

        const fail = (message) => {
          titleEl.textContent = 'Could not open report';
          messageEl.textContent = message;
          messageEl.className = 'error';
        };

        try {
          const params = new URLSearchParams(window.location.search);
          const source = params.get('source');
          if (!source) {
            fail('Missing report source URL.');
            return;
          }

          let sourceUrl;
          try {
            sourceUrl = new URL(source);
          } catch {
            fail('Invalid report source URL.');
            return;
          }

          const isSupabaseHost = sourceUrl.protocol === 'https:' && sourceUrl.hostname.endsWith('.supabase.co');
          const isExportPath = sourceUrl.pathname.includes('/functions/v1/export-progress-report-pdf');
          if (!isSupabaseHost || !isExportPath) {
            fail('Unrecognized report source URL.');
            return;
          }

          const response = await fetch(sourceUrl.toString(), {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit',
            headers: {
              Accept: 'text/plain, text/html, application/json',
            },
          });

          const body = await response.text();
          if (!response.ok) {
            fail(body || ('Request failed with status ' + response.status + '.'));
            return;
          }

          const trimmed = body.trim();
          if (!trimmed) {
            fail('The report response was empty.');
            return;
          }

          if (trimmed.startsWith('{')) {
            try {
              const parsed = JSON.parse(trimmed);
              fail(parsed.error || parsed.message || 'The report endpoint returned an error.');
              return;
            } catch {
              // Continue and try to render as HTML.
            }
          }

          document.open();
          document.write(body);
          document.close();
        } catch (error) {
          fail(error && error.message ? error.message : 'Unexpected error while loading the report.');
        }
      })();
    </script>
  </body>
  </html>

[build]
  base = "."
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing - This is critical for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for hashed build assets. Do NOT set Content-Type on "/assets/*" —
# that would mark CSS (and fonts, etc.) as JavaScript and the browser will not apply styles.
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

